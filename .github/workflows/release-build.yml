name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.{png,jpg,jpeg,svg,gif}"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.{png,jpg,jpeg,svg,gif}"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag / version (e.g. v1.2.3)"
        required: true
        type: string
      skip_release:
        description: "Skip creating a release (build only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: alua-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_version: ${{ steps.version.outputs.tag_version }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_RESTORE_LOCKED_MODE: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            fw: net10.0-desktop
            art: win-x64
            binary_name: Alua.exe
          - os: macos-latest
            rid: osx-arm64
            fw: net10.0-desktop
            art: osx-arm64
            binary_name: Alua.app
          - os: ubuntu-latest
            rid: linux-x64
            fw: net10.0-desktop
            art: linux-x64
            binary_name: Alua
          - os: ubuntu-latest
            rid: android-arm64
            fw: net10.0-android
            art: android-arm64
            binary_name: net.rarisma.gravity-Signed.apk

    steps:
      # 1 ─ Checkout repositories
      - name: Checkout Alua
        uses: actions/checkout@v4
        with:
          path: Alua
          fetch-depth: 1

      - name: Checkout SACHYA
        uses: actions/checkout@v4
        with:
          repository: rarisma/sachya
          path: SACHYA

      # 2 ─ Install the .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      # 3 ─ Install required workloads
      - name: Install .NET workloads
        run: dotnet workload install android

      - name: Install Uno macOS workload
        if: matrix.os == 'macos-latest'
        run: dotnet workload install macos

      # 4 ─ Update appsettings.json with content from secret
      - name: Update appsettings.json with content from secret
        shell: bash
        run: |
          echo '${{ secrets.ENVCONTENT }}' > Alua/Alua/appsettings.json

      # 5 ─ Generate version
      - name: Generate version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            if [ "${{ github.event.inputs.skip_release }}" = "false" ]; then
              v="${{ github.event.inputs.version }}"
              v="${v#v}"
            else
              v="0.0.${{ github.run_number }}"
            fi
          else
            v="0.0.${{ github.run_number }}"
          fi
          echo "version=$v" >> $GITHUB_OUTPUT
          echo "tag_version=$v" >> $GITHUB_OUTPUT
          echo "Generated version: $v"

      # 6 ─ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore Alua/Alua.sln

      # 7 ─ Build and publish
      - name: Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet publish Alua/Alua/Alua.csproj `
            -c Release `
            -f ${{ matrix.fw }} `
            -r ${{ matrix.rid }} `
            -p:UseMonoRuntime=false `
            --self-contained `
            -o publish

      - name: Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          dotnet publish Alua/Alua/Alua.csproj \
            -c Release \
            -f ${{ matrix.fw }} \
            -r ${{ matrix.rid }} \
            -p:UseMonoRuntime=false \
            --self-contained \
            -o publish

      - name: Publish (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.fw == 'net10.0-desktop'
        run: |
          dotnet publish Alua/Alua/Alua.csproj \
            -c Release \
            -f ${{ matrix.fw }} \
            -r ${{ matrix.rid }} \
            -p:UseMonoRuntime=false \
            --self-contained \
            -o publish

      - name: Publish (Android)
        if: matrix.fw == 'net10.0-android'
        run: |
          dotnet publish Alua/Alua/Alua.csproj \
            -c Release \
            -f ${{ matrix.fw }} \
            -r ${{ matrix.rid }} \
            -o publish

      # 8 ─ Create macOS PKG
      - name: Create macOS PKG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg-build/Applications
          cp -R publish/Alua.app pkg-build/Applications/

          pkgbuild --root pkg-build \
            --identifier net.rarisma.gravity \
            --version ${{ steps.version.outputs.version }} \
            --install-location / \
            alua-${{ matrix.art }}.pkg

      # 9 ─ Package artifacts
      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        run: |
          cd publish
          Compress-Archive -Path * -DestinationPath ../alua-${{ matrix.art }}.zip

      - name: Package Linux artifact
        if: matrix.os == 'ubuntu-latest' && matrix.fw == 'net10.0-desktop'
        run: |
          cd publish
          tar -czf ../alua-${{ matrix.art }}.tar.gz *

      - name: Package Android artifact
        if: matrix.fw == 'net10.0-android'
        run: |
          cd publish
          cp *.apk ../alua-${{ matrix.art }}.apk

      # 10 ─ Upload artifacts
      - name: Upload build artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: alua-${{ matrix.art }}
          path: alua-${{ matrix.art }}.zip
          if-no-files-found: error

      - name: Upload build artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: alua-${{ matrix.art }}
          path: alua-${{ matrix.art }}.pkg
          if-no-files-found: error

      - name: Upload build artifacts (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.fw == 'net10.0-desktop'
        uses: actions/upload-artifact@v4
        with:
          name: alua-${{ matrix.art }}
          path: alua-${{ matrix.art }}.tar.gz
          if-no-files-found: error

      - name: Upload build artifacts (Android)
        if: matrix.fw == 'net10.0-android'
        uses: actions/upload-artifact@v4
        with:
          name: alua-${{ matrix.art }}
          path: alua-${{ matrix.art }}.apk
          if-no-files-found: error

  # ---------- RELEASE ----------
  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && !inputs.skip_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_version }}
          name: Release ${{ needs.build.outputs.tag_version }}
          files: |
            alua-win-x64/alua-win-x64.zip
            alua-osx-arm64/alua-osx-arm64.pkg
            alua-linux-x64/alua-linux-x64.tar.gz
            alua-android-arm64/alua-android-arm64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
